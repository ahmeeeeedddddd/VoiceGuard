version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: voiceguard_user
      POSTGRES_PASSWORD: voiceguard_password
      POSTGRES_DB: voiceguard_db
    ports:
      - "5434:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  # Optional Admin Tools
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@voiceguard.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
